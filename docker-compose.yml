services:
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: goac
      POSTGRES_USER: goac
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goac_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://goac:${POSTGRES_PASSWORD:-goac_dev}@db:5432/goac
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads

  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend

volumes:
  pgdata:
