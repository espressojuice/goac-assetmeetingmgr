services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
      FRONTEND_URL: https://assetmeeting.goac.io
      UPLOAD_DIR: /app/uploads
      ENVIRONMENT: production
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.goac-api.rule=Host(`assetmeeting.goac.io`) && PathPrefix(`/api/v1`)"
      - "traefik.http.routers.goac-api.entrypoints=websecure"
      - "traefik.http.routers.goac-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.goac-api.loadbalancer.server.port=8000"
      - "traefik.http.routers.goac-api.priority=2"
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://assetmeeting.goac.io/api/v1
    environment:
      NEXTAUTH_URL: https://assetmeeting.goac.io
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      - api
    networks:
      - default
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.goac-frontend.rule=Host(`assetmeeting.goac.io`)"
      - "traefik.http.routers.goac-frontend.entrypoints=websecure"
      - "traefik.http.routers.goac-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.goac-frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.goac-frontend.priority=1"
    restart: unless-stopped

  backup:
    image: postgres:16-alpine
    volumes:
      - ./backups:/backups
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    entrypoint: /bin/sh
    command: >
      -c 'while true; do
        TIMESTAMP=$$(date +%Y%m%d_%H%M%S);
        pg_dump -h db -U $${DB_USER:-goac} $${DB_NAME:-goac} | gzip > /backups/backup_$$TIMESTAMP.sql.gz;
        find /backups -name "backup_*.sql.gz" -mtime +7 -delete;
        sleep 86400;
      done'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
    restart: unless-stopped

volumes:
  db_data:
  uploads_data:

networks:
  web:
    external: true
  default:
    driver: bridge
